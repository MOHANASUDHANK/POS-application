// js/shared-modal.js

// Global function that any page can use to initialize its modals
window.initPageModals = function() {
  const modals = document.querySelectorAll('dialog');

  modals.forEach(modal => {
    // 1. Find close buttons inside this specific modal
    const closeBtn = modal.querySelector('.close-modal-btn');
    if (closeBtn) {
      closeBtn.addEventListener('click', () => modal.close());
    }

    // 2. Global background/backdrop click handling
    modal.addEventListener('click', (e) => {
      const rect = modal.getBoundingClientRect();
      if (
        e.clientX < rect.left || e.clientX > rect.right ||
        e.clientY < rect.top || e.clientY > rect.bottom
      ) {
        modal.close();
      }
    });
  });
};

// js/index.js

document.addEventListener('DOMContentLoaded', () => {
  // Wire up the universal closing behaviors first
//   window.initPageModals();

  // Handle unique homepage triggers
  const promoBtn = document.getElementById('openPromoBtn');
  const promoModal = document.getElementById('welcomePromoModal');

  if (promoBtn && promoModal) {
    promoBtn.addEventListener('click', () => {
      promoModal.showModal(); 
    });
  }
});
