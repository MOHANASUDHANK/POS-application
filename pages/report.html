<!DOCTYPE html>
<html>

<head>

    <title>Sales Report</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/report.css">
    <link rel="stylesheet" href="../styles/sidePanel.css">
    <link rel="stylesheet" href="../styles/topPanel.css">
    <!-- <link rel="stylesheet" href="https://cdn.datatables.net/2.3.8/css/dataTables.dataTables.css"> -->
    <link rel="stylesheet" href="../styles/dataTable.css">

</head>

<body>
    <aside class="sidebar">
        <div class="main-logo">
            <img src="../asserts\POS - 01 Register Page.png">
            <div class="logo-name">POS Cafe</div>
        </div>
        <div class="sidebar-content">
            <ul class="nav-menu">
                <a href="billing.html">
                    <li>Billing</li>
                </a>
                <a href="Inventory.html">
                    <li>Inventory</li>
                </a>
                <a href="itemRequest.html">
                    <li>Item Request</li>
                </a>
                <a href="report.html">
                    <li class="active-tab">Sales Report</li>
                </a>
                <li>Settings</li>
                <li>Users</li>
            </ul>
        </div>
        <div class="user-detail">
            <div class="user-logo">
                <img
                    src="https://www.bing.com/th/id/OIP.mb-TeazydHy54flygpdclwHaHa?w=193&h=193&c=8&rs=1&qlt=90&o=6&pid=3.1&rm=2">
                <span class="username">Administrator</span>
            </div>
        </div>
    </aside>
    <div class="report-container">
        <div class="header">
            <div class="main-header">
                <h1>☰ Sales Report</h1>
            </div>
            <div class="date-time-container card">
                <div class="day-container">
                    <img src="../asserts/icons8-date-24.png">
                    <div>27 May 2026<br><span>Monday</span></div>
                </div>
                <div class="time-container ">
                    <img src="../asserts/icons8-clock-32.png">
                    <span>10:30 AM</span>
                </div>
            </div>
        </div>
        <div class="filter-panel card">
            <div class="filter-group">
                <div class="input-box-no combo-container">
                    <label>Item</label>
                    <input type="text" class="itemNameInput" placeholder="Enter item name" autofocus>
                    <ul class="combo-list" id="combo-list" style="display: none;"></ul>
                </div>
            </div>
            <div class="filter-group">
                <div class="middle">
                    <div>
                        <label>Reported Date</label>
                        <div class="filter-period">
                            <button type="button" class="active">Today</button>
                            <button type="button">Yesterday</button>
                            <button type="button">This Week</button>
                            <button type="button">This Month</button>
                            <button type="button" class="custom">Custom</button>
                        </div>
                    </div>
                    <div class="custom-period hidden">
                        <div>
                            <label>Date From</label>
                            <input type="date" id="fromDate" value="">
                        </div>
                        <div><label>Date To</label>
                            <input type="date" id="toDate" value="">
                        </div>
                    </div>
                </div>
            </div>
            <div class="filter-actions">
                <button class="filter-btn active">
                    <img src="../asserts/icons8-filter-50.png">
                    Filter</button>
                <button class="reset-btn">
                    <img src="../asserts/icons8-reset-50.png">
                    Reset</button>
            </div>
        </div>
        <div class="report-panel card">
            <div class="list-header">
                <div class="header-container">
                    <h2>Sales Reports</h2>
                    <span id="total-count">Total 0 reports</span>
                </div>

                <div class="global-search-container">
                    <h>Search</h>
                    <input type="text" id="global-search">
                </div>
                <div class="functionality-button">
                    <button class="excel-btn">
                        <img src="../asserts/icons8-excel-48.png">
                        Export to Excel
                    </button>
                </div>
            </div>
            <div class="table-wrapper">
                <table id="report-table" class="report-table">
                    <thead>
                        <tr>
                            <th>Item Name</th>
                            <th>Sold Quantity</th>
                            <th>Total Price</th>
                        </tr>
                    </thead>
                    <tbody id="report-data"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="../scripts/DB.js"></script>
    <script src="https://code.jquery.com/jquery-3.7.1.js"></script>
    <script src="https://cdn.datatables.net/2.3.8/js/dataTables.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="https://cdn.datatables.net/buttons/3.0.2/js/dataTables.buttons.js"></script>
    <script src="https://cdn.datatables.net/buttons/3.0.2/js/buttons.html5.min.js"></script>
    <script src="../scripts/report.js"></script>
</body>

</html>
